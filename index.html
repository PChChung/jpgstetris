<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="俄羅斯方塊" />
<title>俄羅斯方塊-v2</title>
<style>
  :root{
    --bg:#08111f;
    --panel:#0b1628;
    --line:rgba(160,185,220,.42);
    --border:#55769f;
    --orange:#ff9800;
    --blue:#0b72ff;
    --text:#f5f8ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top,#10213b 0%,var(--bg) 48%,#03070e 100%);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC",Arial,sans-serif;color:var(--text)}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .app{width:100%;height:100%;display:flex;flex-direction:column;padding:10px 8px 8px;gap:8px;max-width:520px;margin:0 auto}
  .title{font-size:clamp(24px,7vw,40px);font-weight:900;text-align:center;letter-spacing:3px;text-shadow:0 0 18px rgba(55,135,255,.8);line-height:1.05}
  .game{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 118px;gap:8px;align-items:stretch}
  .boardWrap{position:relative;border:2px solid var(--border);border-radius:10px;padding:5px;background:linear-gradient(180deg,rgba(8,20,36,.9),rgba(2,8,16,.96));box-shadow:0 0 18px rgba(0,127,255,.35),inset 0 0 16px rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;min-width:0}
  canvas#board{width:100%;height:100%;display:block;background:#040814;border-radius:5px}
  .side{display:flex;flex-direction:column;gap:7px;min-width:0}
  .card{border:2px solid var(--border);border-radius:10px;background:rgba(8,18,32,.88);box-shadow:inset 0 0 12px rgba(50,120,255,.14);padding:8px;text-align:center}
  .stats{display:grid;gap:6px;flex:0 0 auto}.label{font-size:14px;font-weight:800;opacity:.95}.value{font-size:26px;font-weight:900;color:#ffb21d;text-shadow:0 0 9px rgba(255,160,0,.4)}
  .miniTitle{font-size:17px;font-weight:900;margin-bottom:4px}.nextCanvas{width:78px;height:58px;margin:0 auto;display:block}.help{font-size:12px;line-height:1.8;text-align:left;padding-left:10px}.help b{font-size:15px;display:block;text-align:center;margin-bottom:5px}.helpRow{display:flex;gap:6px;align-items:center}.key{width:22px;height:22px;border-radius:50%;background:#102440;display:inline-flex;align-items:center;justify-content:center;font-size:16px;font-weight:900}
  .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.controlsBottom{display:grid;grid-template-columns:1fr 1.15fr;gap:8px}.system{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{border:0;border-radius:12px;font-size:26px;font-weight:900;color:white;background:linear-gradient(#ffb21d,#f28a00);box-shadow:0 5px 0 #8c4c00,0 0 12px rgba(255,152,0,.35);height:54px}.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #8c4c00}.btn.blue{background:linear-gradient(#1688ff,#005cea);box-shadow:0 5px 0 #003984,0 0 12px rgba(0,110,255,.45);font-size:21px}.btn.gray{background:linear-gradient(#677286,#374155);box-shadow:0 5px 0 #1c2433;font-size:21px}.footer{font-size:12px;text-align:center;color:#b9c7d9;margin-top:-2px}
  .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.58);border-radius:8px;text-align:center;padding:16px}.overlay.show{display:flex}.gameOver{font-size:32px;font-weight:1000;color:#ff5555;text-shadow:0 0 12px rgba(255,0,0,.5)}.overScore{font-size:18px;margin-top:8px;color:white}.hint{font-size:14px;margin-top:10px;color:#d8e2f0}
  @media (max-height:740px){.app{gap:6px;padding-top:6px}.title{font-size:26px}.btn{height:46px;font-size:23px}.btn.blue,.btn.gray{font-size:19px}.game{grid-template-columns:minmax(0,1fr) 106px;gap:6px}.card{padding:6px}.value{font-size:23px}.help{font-size:11px;line-height:1.6}.nextCanvas{height:48px}.footer{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="title">俄羅斯方塊</div>
  <div class="game">
    <div class="boardWrap">
      <canvas id="board" width="300" height="600"></canvas>
      <div id="overlay" class="overlay"><div><div class="gameOver">GAME OVER</div><div class="overScore">分數：<span id="finalScore">0</span></div><div class="hint">按「重新開始」再玩一次</div></div></div>
    </div>
    <div class="side">
      <div class="card stats"><div><div class="label">分數</div><div id="score" class="value">0</div></div><hr><div><div class="label">行數</div><div id="lines" class="value" style="color:#66ee22">0</div></div><hr><div><div class="label">等級</div><div id="level" class="value" style="color:#18d8ff">1</div></div></div>
      <div class="card"><div class="miniTitle">下一個</div><canvas id="next" class="nextCanvas" width="100" height="80"></canvas></div>
      <div class="card help"><b>操作說明</b><div class="helpRow"><span class="key">←</span>左移</div><div class="helpRow"><span class="key">→</span>右移</div><div class="helpRow"><span class="key">↓</span>加速下落</div><div class="helpRow"><span class="key">↻</span>旋轉</div></div>
    </div>
  </div>
  <div class="controls"><button class="btn" id="left">←</button><button class="btn" id="rotate">↻</button><button class="btn" id="right">→</button></div>
  <div class="controlsBottom"><button class="btn" id="down">↓</button><button class="btn" id="drop">落下</button></div>
  <div class="system"><button class="btn blue" id="restart">↻ 重新開始</button><button class="btn gray" id="pause">Ⅱ 暫停</button></div>
  <div class="footer">Safari 開啟後可「加入主畫面」當 App 使用</div>
</div>
<script>
const COLS=10, ROWS=20;
const canvas=document.getElementById('board'), ctx=canvas.getContext('2d');
const nextCanvas=document.getElementById('next'), nctx=nextCanvas.getContext('2d');
const scoreEl=document.getElementById('score'), linesEl=document.getElementById('lines'), levelEl=document.getElementById('level'), overlay=document.getElementById('overlay'), finalScore=document.getElementById('finalScore');
const colors={I:'#00d8ff',J:'#116dff',L:'#ff8d00',O:'#ffd51b',S:'#69e800',T:'#a027ff',Z:'#ff2c24'};
const shapes={I:[[1,1,1,1]],J:[[1,0,0],[1,1,1]],L:[[0,0,1],[1,1,1]],O:[[1,1],[1,1]],S:[[0,1,1],[1,1,0]],T:[[0,1,0],[1,1,1]],Z:[[1,1,0],[0,1,1]]};
let board, piece, nextPiece, score, lines, level, dropCounter, dropInterval, lastTime, paused, gameOver, raf;
function createBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null));}
function randomPiece(){const keys=Object.keys(shapes), type=keys[Math.floor(Math.random()*keys.length)];return {type,matrix:shapes[type].map(r=>r.slice()),x:Math.floor(COLS/2)-2,y:0};}
function resizeCanvas(){const wrap=canvas.parentElement; const maxW=wrap.clientWidth-10, maxH=wrap.clientHeight-10; const cell=Math.floor(Math.min(maxW/COLS,maxH/ROWS)); canvas.style.width=(cell*COLS)+'px'; canvas.style.height=(cell*ROWS)+'px';}
window.addEventListener('resize',resizeCanvas);
function drawCell(c,x,y,size,context=ctx){context.fillStyle=c;context.fillRect(x*size+1,y*size+1,size-2,size-2);context.strokeStyle='rgba(255,255,255,.45)';context.lineWidth=1;context.strokeRect(x*size+1.5,y*size+1.5,size-3,size-3);}
function drawGrid(){const w=canvas.width/COLS,h=canvas.height/ROWS;ctx.strokeStyle='rgba(145,165,195,.5)';ctx.lineWidth=1;for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*w,0);ctx.lineTo(x*w,canvas.height);ctx.stroke();}for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*h);ctx.lineTo(canvas.width,y*h);ctx.stroke();}}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#030712';ctx.fillRect(0,0,canvas.width,canvas.height);drawGrid();const size=canvas.width/COLS;board.forEach((row,y)=>row.forEach((c,x)=>{if(c)drawCell(c,x,y,size)})); if(piece) piece.matrix.forEach((row,y)=>row.forEach((v,x)=>{if(v)drawCell(colors[piece.type],piece.x+x,piece.y+y,size)}));}
function drawNext(){nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height); if(!nextPiece)return; const m=nextPiece.matrix, size=22; const ox=(nextCanvas.width-m[0].length*size)/2, oy=(nextCanvas.height-m.length*size)/2; m.forEach((row,y)=>row.forEach((v,x)=>{if(v){nctx.fillStyle=colors[nextPiece.type];nctx.fillRect(ox+x*size+1,oy+y*size+1,size-2,size-2);nctx.strokeStyle='rgba(255,255,255,.45)';nctx.strokeRect(ox+x*size+1.5,oy+y*size+1.5,size-3,size-3);}}));}
function collide(b,p){return p.matrix.some((row,y)=>row.some((v,x)=>v&&(b[p.y+y]?.[p.x+x]!==null&&b[p.y+y]?.[p.x+x]!==undefined || p.x+x<0 || p.x+x>=COLS || p.y+y>=ROWS)));}
function merge(){piece.matrix.forEach((row,y)=>row.forEach((v,x)=>{if(v&&piece.y+y>=0)board[piece.y+y][piece.x+x]=colors[piece.type];}));}
function rotateMatrix(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse());}
function rotate(){if(paused||gameOver)return;const old=piece.matrix, oldX=piece.x;piece.matrix=rotateMatrix(piece.matrix);let offset=1;while(collide(board,piece)){piece.x+=offset;offset=-(offset+(offset>0?1:-1));if(Math.abs(offset)>piece.matrix[0].length+1){piece.matrix=old;piece.x=oldX;break;}}draw();}
function sweep(){let rowCount=1;outer:for(let y=ROWS-1;y>=0;y--){for(let x=0;x<COLS;x++){if(!board[y][x])continue outer;}board.splice(y,1);board.unshift(Array(COLS).fill(null));score+=rowCount*100;lines++;rowCount*=2;y++;}level=Math.floor(lines/10)+1;dropInterval=Math.max(110,700-(level-1)*55);updateUI();}
function updateUI(){scoreEl.textContent=score;linesEl.textContent=lines;levelEl.textContent=level;}
function spawn(){piece=nextPiece||randomPiece();nextPiece=randomPiece();piece.x=Math.floor(COLS/2)-Math.ceil(piece.matrix[0].length/2);piece.y=0;drawNext();if(collide(board,piece)){gameOver=true;overlay.classList.add('show');finalScore.textContent=score;}}
function drop(){if(paused||gameOver)return;piece.y++;if(collide(board,piece)){piece.y--;merge();sweep();spawn();}dropCounter=0;draw();}
function hardDrop(){if(paused||gameOver)return;while(!collide(board,piece))piece.y++;piece.y--;score+=2;merge();sweep();spawn();draw();}
function move(dir){if(paused||gameOver)return;piece.x+=dir;if(collide(board,piece))piece.x-=dir;draw();}
function loop(time=0){const delta=time-lastTime;lastTime=time;if(!paused&&!gameOver){dropCounter+=delta;if(dropCounter>dropInterval)drop();draw();}raf=requestAnimationFrame(loop);}
function restart(){cancelAnimationFrame(raf);board=createBoard();piece=null;nextPiece=randomPiece();score=0;lines=0;level=1;dropCounter=0;dropInterval=700;lastTime=0;paused=false;gameOver=false;overlay.classList.remove('show');document.getElementById('pause').textContent='Ⅱ 暫停';updateUI();resizeCanvas();spawn();draw();loop();}
function togglePause(){if(gameOver)return;paused=!paused;document.getElementById('pause').textContent=paused?'▶ 繼續':'Ⅱ 暫停';}
document.getElementById('left').onclick=()=>move(-1);document.getElementById('right').onclick=()=>move(1);document.getElementById('rotate').onclick=rotate;document.getElementById('down').onclick=drop;document.getElementById('drop').onclick=hardDrop;document.getElementById('restart').onclick=restart;document.getElementById('pause').onclick=togglePause;
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(-1);else if(e.key==='ArrowRight')move(1);else if(e.key==='ArrowDown')drop();else if(e.key==='ArrowUp'||e.key===' ')rotate();else if(e.key==='Enter')hardDrop();else if(e.key.toLowerCase()==='p')togglePause();});
restart();
</script>
</body>
</html>
