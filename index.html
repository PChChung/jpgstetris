const COLS=10,ROWS=20,canvas=document.getElementById('board'),ctx=canvas.getContext('2d'),nextCanvas=document.getElementById('next'),nctx=nextCanvas.getContext('2d'),oppCanvas=document.getElementById('oppBoard'),octx=oppCanvas.getContext('2d');

function safeName(n){return String(n||'玩家').trim().slice(0,16).replace(/[<>]/g,'')||'玩家'}function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}function createBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null))}function randomPiece(){const ks=Object.keys(shapes),type=ks[Math.floor(Math.random()*ks.length)];return{type,matrix:shapes[type].map(r=>r.slice()),x:Math.floor(COLS/2)-2,y:0}}
function resizeCanvas(){const wrap=canvas.parentElement;if(!wrap)return;const maxW=wrap.clientWidth-10,maxH=wrap.clientHeight-10;const cell=Math.max(10,Math.floor(Math.min(maxW/COLS,maxH/ROWS)));canvas.style.width=(cell*COLS)+'px';canvas.style.height=(cell*ROWS)+'px'}

function collide(b,p){return p.matrix.some((r,y)=>r.some((v,x)=>v&&(p.x+x<0||p.x+x>=COLS||p.y+y>=ROWS||(b[p.y+y]?.[p.x+x]!==null&&b[p.y+y]?.[p.x+x]!==undefined))))}function merge(){piece.matrix.forEach((r,y)=>r.forEach((v,x)=>{if(v&&piece.y+y>=0)board[piece.y+y][piece.x+x]=colors[piece.type]}))}function rotateMatrix(m){return m[0].map((_,i)=>m.map(r=>r[i]).reverse())}function rotate(){if(paused||gameOver)return;const old=piece.matrix,oldX=piece.x;piece.matrix=rotateMatrix(piece.matrix);let off=1;while(collide(board,piece)){piece.x+=off;off=-(off+(off>0?1:-1));if(Math.abs(off)>piece.matrix[0].length+1){piece.matrix=old;piece.x=oldX;break}}draw();syncNow()}

function spawn(){piece=nextPiece||randomPiece();nextPiece=randomPiece();piece.x=Math.floor(COLS/2)-Math.ceil(piece.matrix[0].length/2);piece.y=0;drawNext();if(collide(board,piece)){endGame(false)}}async function drop(){if(paused||gameOver)return;piece.y++;if(collide(board,piece)){piece.y--;merge();await sweep();spawn()}dropCounter=0;draw();syncNow()}async function hardDrop(){if(paused||gameOver)return;while(!collide(board,piece))piece.y++;piece.y--;score+=2;merge();await sweep();spawn();draw();syncNow()}function move(dir){if(paused||gameOver)return;piece.x+=dir;if(collide(board,piece))piece.x-=dir;draw();syncNow()}
function loop(t=0){const d=t-lastTime;lastTime=t;if(!paused&&!gameOver){dropCounter+=d;if(dropCounter>dropInterval)drop();draw()}raf=requestAnimationFrame(loop)}
function startGame(m){mode=m;lastAppliedGarbage=0;document.getElementById('menu').classList.add('hide');document.getElementById('lobby').classList.add('hide');document.getElementById('app').classList.toggle('singleMode',mode==='single');document.getElementById('oppCard').classList.toggle('hide',mode==='single');document.getElementById('singleCard').classList.toggle('hide',mode!=='single');document.getElementById('rankOrLeave').textContent='返回選單';document.getElementById('modeTag').textContent=mode==='single'?'單人模式':`對戰模式 ${room?room.room_code:''}`;restart()}
function restart(){cancelAnimationFrame(raf);board=createBoard();piece=null;nextPiece=randomPiece();score=0;lines=0;level=1;garbageQueue=0;applyingGarbage=false;clearInterval(garbageTimer);lastAppliedGarbage=0;dropCounter=0;dropInterval=700;lastTime=0;paused=false;gameOver=false;submitted=false;overlay.classList.remove('show');resultTitle.className='gameOver';resultTitle.textContent='GAME OVER';extraScore.textContent='';onlineStatus.textContent='';document.getElementById('pause').textContent='Ⅱ 暫停';updateUI();resizeCanvas();spawn();draw();syncNow();loop()}
async function endGame(win){if(gameOver)return;gameOver=true;finalScore.textContent=score;overlay.classList.add('show');if(mode==='single'){let best=Number(localStorage.getItem('tetrisBestScore')||0);if(score>best){best=score;localStorage.setItem('tetrisBestScore',best);bestScoreEl.textContent=best;extraScore.textContent='新最高分：'+best}else extraScore.textContent='最高分：'+best;onlineStatus.textContent='可按「重新開始」再玩一次';await submitScore()}else{await syncNow(true);const oppScore=opponent?.score||0;extraScore.textContent='對手分數：'+oppScore;if(win){resultTitle.className='winText';resultTitle.textContent='YOU WIN'}else{resultTitle.className='gameOver';resultTitle.textContent='GAME OVER'}onlineStatus.textContent='可按「重新開始」再玩一次'}}
async function submitScore(){if(submitted||!ready||!db||score<=0)return;submitted=true;const name=safeName(localStorage.getItem('tetrisPlayerName')||prompt('請輸入排行榜名稱','玩家'));localStorage.setItem('tetrisPlayerName',name);try{await db.from(SCORE_TABLE).insert({player_name:name,score,lines,level});onlineStatus.textContent='分數已送出排行榜'}catch(e){onlineStatus.textContent='排行榜上傳失敗：'+(e.message||e)}}
function togglePause(){if(gameOver)return;paused=!paused;document.getElementById('pause').textContent=paused?'▶ 繼續':'Ⅱ 暫停'}
async function openRank(){document.getElementById('leaderboardModal').classList.add('show');const rows=document.getElementById('leaderRows'),st=document.getElementById('leaderStatus');rows.innerHTML='';if(!ready||!db){st.textContent='請先在 HTML 內填入 Supabase URL 與 anon key。';return}st.textContent='讀取中...';try{const {data,error}=await db.from(SCORE_TABLE).select('player_name,score,lines,level,created_at').order('score',{ascending:false}).limit(10);if(error)throw error;if(!data?.length){st.textContent='目前還沒有排行榜資料。';return}rows.innerHTML=data.map((r,i)=>`<div class="leaderRow"><div>#${i+1}</div><div class="leaderName">${safeName(r.player_name)}<span style="font-size:11px;color:#9fb2c9">　${r.lines||0}行 Lv.${r.level||1}</span></div><div>${r.score||0}</div></div>`).join('');st.textContent='只顯示前 10 名。'}catch(e){st.textContent='讀取失敗：'+(e.message||e)}}
function getName(){const n=safeName(document.getElementById('playerName').value||'玩家');localStorage.setItem('tetrisPlayerName',n);return n}function showLobbyStatus(s){document.getElementById('lobbyStatus').textContent=s}async function createRoom(){if(!ready||!db)return showLobbyStatus('請先填入 Supabase URL 與 anon key。');try{const rc=code();const {data:r,error:re}=await db.from('rooms').insert({room_code:rc,status:'waiting',started:false}).select().single();if(re)throw re;const {data:p,error:pe}=await db.from('players').insert({room_id:r.id,player_name:getName(),is_host:true,is_ready:true,score:0,lines:0,level:1,game_over:false,board:createBoard()}).select().single();if(pe)throw pe;room=r;myPlayer=p;await afterRoomJoin()}catch(e){showLobbyStatus('建立失敗：'+(e.message||e))}}
async function joinRoom(){if(!ready||!db)return showLobbyStatus('請先填入 Supabase URL 與 anon key。');const rc=(document.getElementById('joinCode').value||'').trim().toUpperCase();if(!rc)return showLobbyStatus('請輸入房號。');try{const {data:r,error:re}=await db.from('rooms').select('*').eq('room_code',rc).single();if(re||!r)throw new Error('找不到房間');const {data:ps}=await db.from('players').select('*').eq('room_id',r.id);if(ps&&ps.length>=2)throw new Error('房間已滿');const {data:p,error:pe}=await db.from('players').insert({room_id:r.id,player_name:getName(),is_host:false,is_ready:true,score:0,lines:0,level:1,game_over:false,board:createBoard()}).select().single();if(pe)throw pe;room=r;myPlayer=p;await afterRoomJoin()}catch(e){showLobbyStatus('加入失敗：'+(e.message||e))}}
async function afterRoomJoin(){document.getElementById('lobbyWaiting').style.display='block';document.getElementById('roomCodeView').textContent=room.room_code;document.getElementById('startBattle').style.display=myPlayer.is_host?'block':'none';showLobbyStatus(myPlayer.is_host?'等待玩家加入，兩人到齊後按開始遊戲。':'等待房主開始遊戲，若房主開始後沒有跳轉，請檢查 rooms_update policy。');subscribeRoom();await refreshRoom()}
async function refreshRoom(){if(!room||!db)return;const {data:ps}=await db.from('players').select('*').eq('room_id',room.id);const {data:r}=await db.from('rooms').select('*').eq('id',room.id).single();if(r)room=r;if(ps){const me=ps.find(p=>p.id===myPlayer?.id);if(me){myPlayer={...myPlayer,...me};const incoming=Number(me.pending_garbage||0);if(mode==='battle'&&incoming>0&&!gameOver){await db.from('players').update({pending_garbage:0,updated_at:new Date().toISOString()}).eq('id',myPlayer.id);myPlayer.pending_garbage=0;applyGarbageRows(incoming)}}opponent=ps.find(p=>p.id!==myPlayer.id)||null;document.getElementById('playerList').innerHTML=ps.map(p=>`${p.is_host?'👑 ':'• '}${safeName(p.player_name)}　${p.is_ready?'✓':'-'}`).join('<br>');drawOpponent()}if(room.started&&!document.getElementById('lobby').classList.contains('hide'))startGame('battle')}
function subscribeRoom(){if(battleChannel)db.removeChannel(battleChannel);battleChannel=db.channel('room_'+room.id).on('postgres_changes',{event:'*',schema:'public',table:'players',filter:`room_id=eq.${room.id}`},refreshRoom).on('postgres_changes',{event:'*',schema:'public',table:'rooms',filter:`id=eq.${room.id}`},refreshRoom).subscribe()}async function startBattle(){if(!myPlayer?.is_host)return;const {error}=await db.from('rooms').update({started:true,status:'playing'}).eq('id',room.id);if(error){showLobbyStatus('開始失敗：rooms 缺少 UPDATE 權限，請先新增 rooms_update policy。');return;}room.started=true;room.status='playing';startGame('battle')}async function syncNow(force=false){if(mode!=='battle'||!db||!myPlayer||(!force&&gameOver))return;const payload={score,lines,level,game_over:gameOver,board,updated_at:new Date().toISOString()};try{await db.from('players').update(payload).eq('id',myPlayer.id)}catch(e){}}
function startSyncTimer(){clearInterval(syncTimer);syncTimer=setInterval(async()=>{if(mode==='battle'){await refreshRoom();if(opponent?.game_over&&!gameOver)endGame(true);else syncNow()}},300)}startSyncTimer();
function bindHold(id,fn,repeat=105){const el=document.getElementById(id);let timer=null,delay=null;const start=e=>{e.preventDefault();fn();el.classList.add('holding');clearInterval(timer);clearTimeout(delay);delay=setTimeout(()=>{timer=setInterval(fn,repeat)},170)};const stop=e=>{if(e)e.preventDefault();el.classList.remove('holding');clearInterval(timer);clearTimeout(delay)};el.addEventListener('pointerdown',start,{passive:false});['pointerup','pointercancel','pointerleave','lostpointercapture'].forEach(ev=>el.addEventListener(ev,stop,{passive:false}))}
bindHold('left',()=>move(-1),90);bindHold('right',()=>move(1),90);bindHold('down',drop,75);document.getElementById('rotate').addEventListener('pointerdown',e=>{e.preventDefault();rotate()},{passive:false});document.getElementById('drop').addEventListener('pointerdown',e=>{e.preventDefault();hardDrop()},{passive:false});function goMainMenu(){paused=true;cancelAnimationFrame(raf);overlay.classList.remove('show');document.getElementById('lobby').classList.add('hide');document.getElementById('menu').classList.remove('hide');if(battleChannel&&db){db.removeChannel(battleChannel);battleChannel=null}room=null;myPlayer=null;opponent=null;document.getElementById('modeTag').textContent='單人模式';document.getElementById('rankOrLeave').textContent='返回選單'}
document.getElementById('restart').onclick=restart;document.getElementById('pause').onclick=togglePause;document.getElementById('rankOrLeave').onclick=goMainMenu;document.getElementById('singleBtn').onclick=()=>startGame('single');document.getElementById('battleBtn').onclick=()=>{document.getElementById('menu').classList.add('hide');document.getElementById('lobby').classList.remove('hide')};document.getElementById('menuRankBtn').onclick=openRank;document.getElementById('createRoom').onclick=createRoom;document.getElementById('joinRoom').onclick=joinRoom;document.getElementById('startBattle').onclick=startBattle;document.getElementById('backMenu').onclick=goMainMenu;document.getElementById('copyRoom').onclick=async()=>{const text=(document.getElementById('roomCodeView').textContent||'').trim();if(!text||text==='------')return showLobbyStatus('目前沒有可複製的房間代碼。');try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text)}else{const tmp=document.createElement('input');tmp.value=text;document.body.appendChild(tmp);tmp.select();document.execCommand('copy');tmp.remove()}showLobbyStatus('房間代碼已複製：'+text)}catch(e){showLobbyStatus('複製失敗，請手動複製：'+text)}};document.getElementById('closeRank').onclick=()=>document.getElementById('leaderboardModal').classList.remove('show');
let sx=0,sy=0,st=0;const touch=document.getElementById('touchArea');touch.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;st=Date.now()},{passive:false});touch.addEventListener('pointerup',e=>{const dx=e.clientX-sx,dy=e.clientY-sy,adX=Math.abs(dx),adY=Math.abs(dy);if(Math.max(adX,adY)<18){rotate();return}if(adX>adY){const steps=Math.min(3,Math.max(1,Math.round(adX/42)));for(let i=0;i<steps;i++)move(dx>0?1:-1)}else{dy>0?hardDrop():rotate()}},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(-1);else if(e.key==='ArrowRight')move(1);else if(e.key==='ArrowDown')drop();else if(e.key==='ArrowUp'||e.key===' ')rotate();else if(e.key==='Enter')hardDrop();else if(e.key.toLowerCase()==='p')togglePause()});
// 預先畫出空盤面
board=createBoard();nextPiece=randomPiece();resizeCanvas();draw();drawNext();drawOpponent();
</script>
